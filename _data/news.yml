- title: Prof. Xiaohua Jia Elected ACM Fellow
  summary: Professor Xiaohua Jia has been elected a Fellow of the Association for Computing Machinery for outstanding achievements and contributions to data security and distributed computing systems.
  img: acm-fellow-2026.jpeg
  link: https://www.cityu.edu.hk/media/news/2026/02/27/cityuhk-scholar-named-prestigious-acm-fellow

- title: Congratulations to Three PhD Graduates
  summary: Congratulations to Dr. Ciyuan Chen, Dr. Mingyue Wang, and Dr. Sen Peng on completing their PhD studies. Their work has made valuable contributions across intelligent IoT and LoRa systems, secure and privacy-preserving computing, blockchain systems, storage auditing, and AI security. We are proud of their achievements and wish them continued success.
  img: phd-graduation-2026.jpg

- title: First Keynote Speech at IWQOS 2025
  summary: Professor Xiaohua Jia was the first keynote speaker at IWQOS 2025, presenting secure, incentivized, and unlearning-enabled data sharing for large model machine learning.
  img: IWQOS25-Homepage-Banners_v2_27JUNE25_JB-05.png
  link: https://iwqos2025.ieee-iwqos.org/program/full-program

- title: RGC Senior Research Fellow
  summary: Professor Xiaohua Jia was awarded the RGC Senior Research Fellow for 2024/25, recognizing his sustained research excellence and leadership.
  img: rgc_award.jpg
  link: https://www.ugc.edu.hk/eng/rgc/funding_opport/rrfs/awardees.html
