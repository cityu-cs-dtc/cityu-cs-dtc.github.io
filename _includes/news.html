<section id="latest-news" class="latest-news-section">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 text-center">
        <h2 class="section-heading">Latest News</h2>
        <hr class="primary">
      </div>
    </div>
  </div>

  <div class="news-carousel-wrap">
    <div class="swiper newsSwiper">
      <div class="swiper-wrapper">
        {% for item in site.data.news %}
        <div class="swiper-slide">
          <article class="news-card">
            <div class="news-image-wrap">
              <img src="{{ '/resources/img/news/' | append: item.img | relative_url }}" alt="{{ item.title }}" class="news-image">
            </div>

            <div class="news-content">
              <h3>{{ item.title }}</h3>
              <p>{{ item.summary }}</p>

              {% if item.link %}
              <a href="{{ item.link }}" target="_blank" rel="noopener noreferrer" class="news-link">More Info</a>
              {% endif %}

            </div>
          </article>
        </div>
        {% endfor %}
      </div>
      <div class="swiper-pagination"></div>
      <div class="swiper-button-next" aria-label="Next news"></div>
      <div class="swiper-button-prev" aria-label="Previous news"></div>
    </div>
  </div>
</section>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    var newsSwiper = new Swiper(".newsSwiper", {
      loop: true,
      speed: 850,
      autoplay: {
        delay: 4200,
        disableOnInteraction: false,
        pauseOnMouseEnter: true
      },
      pagination: {
        el: ".newsSwiper .swiper-pagination",
        clickable: true
      },
      navigation: {
        nextEl: ".newsSwiper .swiper-button-next",
        prevEl: ".newsSwiper .swiper-button-prev"
      }
    });

    var carousel = document.querySelector(".newsSwiper");
    if (carousel) {
      carousel.addEventListener("mouseenter", function () {
        newsSwiper.autoplay.stop();
      });
      carousel.addEventListener("mouseleave", function () {
        newsSwiper.autoplay.start();
      });
    }
  });
</script>

<style>
.latest-news-section {
  padding: 72px 0 78px;
  background: #ffffff;
}

.latest-news-section .section-heading {
  margin-top: 0;
  font-weight: 700;
  letter-spacing: 0;
}

.news-carousel-wrap {
  width: min(980px, calc(100% - 32px));
  margin: 28px auto 0;
}

.newsSwiper {
  padding: 0 54px 36px;
}

.news-card {
  display: grid;
  grid-template-columns: minmax(0, 1.05fr) minmax(300px, 0.95fr);
  height: 350px;
  background: #ffffff;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 10px 28px rgba(17, 24, 39, 0.09);
}

.news-image-wrap {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f4f5f7;
  overflow: hidden;
}

.news-image {
  width: 100%;
  height: 100%;
  max-height: 350px;
  object-fit: contain;
  object-position: center;
  display: block;
}

.news-content {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 30px 34px;
  font-family: 'Open Sans', 'Helvetica Neue', Arial, sans-serif;
}

.news-content h3 {
  margin: 0 0 14px;
  color: #111827;
  font-size: 24px;
  line-height: 1.25;
  font-weight: 700;
  text-transform: none;
}

.news-content p {
  margin: 0 0 20px;
  color: #4b5563;
  font-size: 15px;
  line-height: 1.65;
}

.news-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  align-self: flex-start;
  min-height: 42px;
  padding: 0 18px;
  border-radius: 4px;
  background: #f05f40;
  color: #ffffff !important;
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  text-decoration: none !important;
  letter-spacing: 0;
  transition: background 0.2s ease, transform 0.2s ease;
}

.news-link:hover,
.news-link:focus {
  background: #e64a2a;
  transform: translateY(-1px);
}

.newsSwiper .swiper-button-prev,
.newsSwiper .swiper-button-next {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: #ffffff;
  border: 1px solid #e5e7eb;
  color: #f05f40;
  box-shadow: 0 6px 18px rgba(17, 24, 39, 0.12);
  transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
}

.newsSwiper .swiper-button-prev:hover,
.newsSwiper .swiper-button-next:hover {
  background: #f05f40;
  color: #ffffff;
  transform: translateY(-1px);
}

.newsSwiper .swiper-button-prev::after,
.newsSwiper .swiper-button-next::after {
  font-size: 16px;
  font-weight: 700;
}

.newsSwiper .swiper-pagination {
  bottom: 0 !important;
}

.newsSwiper .swiper-pagination-bullet {
  width: 9px;
  height: 9px;
  margin: 0 5px !important;
  background: #d1d5db;
  opacity: 1;
}

.newsSwiper .swiper-pagination-bullet-active {
  background: #f05f40;
}

@media (max-width: 991px) {
  .latest-news-section {
    padding: 64px 0 70px;
  }

  .newsSwiper {
    padding: 0 46px 34px;
  }

  .news-card {
    grid-template-columns: 1fr;
    height: auto;
  }

  .news-image {
    height: 280px;
    max-height: 280px;
  }

  .news-content {
    padding: 26px 28px 30px;
  }
}

@media (max-width: 600px) {
  .news-carousel-wrap {
    width: calc(100% - 24px);
    margin-top: 24px;
  }

  .newsSwiper {
    padding: 0 0 34px;
  }

  .newsSwiper .swiper-button-prev,
  .newsSwiper .swiper-button-next {
    display: none;
  }

  .news-image {
    height: 220px;
    max-height: 220px;
  }

  .news-content {
    padding: 24px 20px 28px;
  }

  .news-content h3 {
    font-size: 22px;
  }

  .news-content p {
    font-size: 15px;
    line-height: 1.65;
  }
}
</style>
