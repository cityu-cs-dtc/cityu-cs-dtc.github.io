<section id="latest-news" class="latest-news-section">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 text-center">
        <h2 class="section-heading">Latest News</h2>
        <hr class="primary">
      </div>
    </div>
  </div>

  <div class="news-carousel-wrap">
    <div class="swiper newsSwiper">
      <div class="swiper-wrapper">
        {% for item in site.data.news %}
        <div class="swiper-slide">
          <article class="news-card">
            <div class="news-image-wrap">
              <img src="{{ '/resources/img/news/' | append: item.img | relative_url }}" alt="{{ item.title }}" class="news-image">
            </div>

            <div class="news-content">
              <h3>{{ item.title }}</h3>
              <p>{{ item.summary }}</p>

              {% if item.link %}
              <a href="{{ item.link }}" target="_blank" rel="noopener noreferrer" class="news-link">More Info</a>
              {% endif %}

            </div>
          </article>
        </div>
        {% endfor %}
      </div>
    </div>
  </div>
</section>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    var newsSwiper = new Swiper(".newsSwiper", {
      loop: true,
      speed: 850,
      autoplay: {
        delay: 4200,
        disableOnInteraction: false,
        pauseOnMouseEnter: true
      }
    });

    var carousel = document.querySelector(".newsSwiper");
    if (carousel) {
      carousel.addEventListener("mouseenter", function () {
        newsSwiper.autoplay.stop();
      });
      carousel.addEventListener("mouseleave", function () {
        newsSwiper.autoplay.start();
      });
    }
  });
</script>

<style>
.latest-news-section {
  padding: 88px 0 96px;
  background: #ffffff;
}

.latest-news-section .section-heading {
  margin-top: 0;
  font-weight: 700;
  letter-spacing: 0;
}

.news-carousel-wrap {
  width: min(1120px, calc(100% - 32px));
  margin: 36px auto 0;
}

.news-card {
  display: grid;
  grid-template-columns: minmax(0, 1.18fr) minmax(320px, 0.82fr);
  min-height: 430px;
  background: #ffffff;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 16px 42px rgba(17, 24, 39, 0.1);
}

.news-image-wrap {
  position: relative;
  background: #f3f4f6;
  overflow: hidden;
}

.news-image {
  width: 100%;
  height: 100%;
  min-height: 430px;
  object-fit: cover;
  object-position: center;
  display: block;
}

.news-content {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 42px 44px;
  font-family: 'Open Sans', 'Helvetica Neue', Arial, sans-serif;
}

.news-content h3 {
  margin: 0 0 18px;
  color: #111827;
  font-size: 28px;
  line-height: 1.22;
  font-weight: 700;
  text-transform: none;
}

.news-content p {
  margin: 0 0 24px;
  color: #4b5563;
  font-size: 16px;
  line-height: 1.75;
}

.news-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  align-self: flex-start;
  min-height: 42px;
  padding: 0 18px;
  border-radius: 4px;
  background: #f05f40;
  color: #ffffff !important;
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  text-decoration: none !important;
  letter-spacing: 0;
  transition: background 0.2s ease, transform 0.2s ease;
}

.news-link:hover,
.news-link:focus {
  background: #e64a2a;
  transform: translateY(-1px);
}

@media (max-width: 991px) {
  .latest-news-section {
    padding: 72px 0 78px;
  }

  .news-card {
    grid-template-columns: 1fr;
    min-height: 0;
  }

  .news-image {
    height: 340px;
    min-height: 340px;
  }

  .news-content {
    padding: 30px 28px 34px;
  }
}

@media (max-width: 600px) {
  .news-carousel-wrap {
    width: calc(100% - 24px);
    margin-top: 28px;
  }

  .news-image {
    height: 245px;
    min-height: 245px;
  }

  .news-content {
    padding: 24px 20px 28px;
  }

  .news-content h3 {
    font-size: 22px;
  }

  .news-content p {
    font-size: 15px;
    line-height: 1.65;
  }
}
</style>
